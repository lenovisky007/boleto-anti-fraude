<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boleto Anti-Fraude</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06153a;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: #1d2a44;
      border-radius: 16px;
      padding: 28px;
    }

    h1 { text-align: center; }

    .section {
      background: #12203b;
      border-radius: 12px;
      padding: 18px;
      margin-top: 18px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      border: none;
    }

    button {
      background: #28c45c;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .secondary { background: #2563eb; }
    .danger { background: #dc2626; }

    .result-box {
      margin-top: 15px;
      background: #08142f;
      border-radius: 10px;
      padding: 14px;
      min-height: 70px;
      word-break: break-word;
    }

    .ok { color: #4ade80; font-weight: bold; }
    .error { color: #f87171; font-weight: bold; }

    .hidden { display: none; }
  </style>
</head>

<body>
<div class="container">
  <h1>Boleto Anti-Fraude</h1>

  <div id="authArea">
    <div class="section">
      <h2>Criar conta</h2>
      <input id="registerName" placeholder="Nome">
      <input id="registerEmail" placeholder="Email">
      <input id="registerPassword" type="password" placeholder="Senha">
      <button onclick="register()">Cadastrar</button>
    </div>

    <div class="section">
      <h2>Login</h2>
      <input id="loginEmail" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Senha">
      <button class="secondary" onclick="login()">Entrar</button>
    </div>

    <div id="authResult" class="result-box">Aguardando ação...</div>
  </div>

  <div id="appArea" class="hidden">
    <div class="section">
      <h2>Conta</h2>
      <div id="meBox" class="result-box">Carregando...</div>
      <button class="danger" onclick="logout()">Sair</button>
    </div>

    <div class="section">
      <h2>Analisar boleto</h2>

      <input id="linha" placeholder="Linha digitável">
      <input id="beneficiario" placeholder="Beneficiário">

      <button onclick="analisar()">Analisar</button>

      <div id="resultBox" class="result-box">Aguardando análise...</div>
    </div>
  </div>
</div>

<script>
const API_URL = "https://boleto-anti-fraude-production.up.railway.app";

function getToken() {
  return localStorage.getItem("token");
}

function setToken(token) {
  localStorage.setItem("token", token);
}

function removeToken() {
  localStorage.removeItem("token");
}

function logout() {
  removeToken();
  location.reload();
}

function showLoggedIn() {
  document.getElementById("authArea").classList.add("hidden");
  document.getElementById("appArea").classList.remove("hidden");
}

function showLoggedOut() {
  document.getElementById("authArea").classList.remove("hidden");
  document.getElementById("appArea").classList.add("hidden");
}

async function safeJson(res) {
  const text = await res.text();

  try {
    return JSON.parse(text);
  } catch {
    return { detail: text || "Resposta inválida do servidor" };
  }
}

async function register() {
  const name = document.getElementById("registerName").value.trim();
  const email = document.getElementById("registerEmail").value.trim();
  const password = document.getElementById("registerPassword").value.trim();
  const authResult = document.getElementById("authResult");

  if (!name || !email || !password) {
    authResult.innerHTML = '<span class="error">Preencha nome, email e senha.</span>';
    return;
  }

  authResult.innerHTML = "Criando conta...";

  try {
    const res = await fetch(`${API_URL}/register`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name, email, password })
    });

    const data = await safeJson(res);

    if (!res.ok) {
      throw new Error(data.detail || "Erro ao cadastrar.");
    }

    authResult.innerHTML = `<span class="ok">${data.message || "Usuário criado com sucesso."}</span>`;
  } catch (error) {
    authResult.innerHTML = `<span class="error">${error.message}</span>`;
  }
}

async function login() {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();
  const authResult = document.getElementById("authResult");

  if (!email || !password) {
    authResult.innerHTML = '<span class="error">Preencha email e senha.</span>';
    return;
  }

  authResult.innerHTML = "Entrando...";

  try {
    const res = await fetch(`${API_URL}/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, password })
    });

    const data = await safeJson(res);

    if (!res.ok) {
      throw new Error(data.detail || "Erro no login.");
    }

    if (!data.access_token) {
      throw new Error("Token não recebido.");
    }

    setToken(data.access_token);
    authResult.innerHTML = `<span class="ok">Login realizado com sucesso.</span>`;

    showLoggedIn();
    await loadMe();
  } catch (error) {
    authResult.innerHTML = `<span class="error">${error.message}</span>`;
  }
}

async function loadMe() {
  const token = getToken();

  if (!token) {
    showLoggedOut();
    return;
  }

  try {
    const res = await fetch(`${API_URL}/me`, {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const data = await safeJson(res);

    if (!res.ok) {
      throw new Error(data.detail || "Erro ao carregar conta.");
    }

    document.getElementById("meBox").innerHTML = `
      Nome: ${data.name}<br>
      Email: ${data.email}<br>
      Plano: ${data.plan}<br>
      Uso: ${data.used_this_month}/${data.monthly_limit}<br>
      Restante: ${data.remaining}
    `;
  } catch (error) {
    removeToken();
    showLoggedOut();
    document.getElementById("authResult").innerHTML = `<span class="error">${error.message}</span>`;
  }
}

async function analisar() {
  const token = getToken();
  const linha = document.getElementById("linha").value.trim();
  const beneficiario = document.getElementById("beneficiario").value.trim();
  const resultBox = document.getElementById("resultBox");

  if (!token) {
    resultBox.innerHTML = '<span class="error">Você precisa estar logado.</span>';
    return;
  }

  if (!linha) {
    resultBox.innerHTML = '<span class="error">Informe a linha digitável.</span>';
    return;
  }

  resultBox.innerHTML = "Analisando...";

  try {
    const res = await fetch(`${API_URL}/analisar`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        linha_digitavel: linha,
        beneficiario: beneficiario
      })
    });

    const data = await safeJson(res);

    if (!res.ok) {
      throw new Error(data.detail || "Erro ao analisar.");
    }

    resultBox.innerHTML = `
      <strong>Resultado</strong><br><br>
      Risco: ${data.risco || "N/D"}<br>
      Score: ${data.score ?? "N/D"}<br>
      Banco: ${data.banco_nome || data.banco || "N/D"}<br>
      Mensagem: ${data.mensagem || "N/D"}<br>
      Usado no mês: ${data.used_this_month ?? "N/D"}<br>
      Restante: ${data.remaining ?? "N/D"}
    `;

    await loadMe();
  } catch (error) {
    resultBox.innerHTML = `<span class="error">${error.message}</span>`;
  }
}

if (getToken()) {
  showLoggedIn();
  loadMe();
} else {
  showLoggedOut();
}
</script>
</body>
</html>
