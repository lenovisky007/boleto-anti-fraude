<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boleto Anti-Fraude</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06153a;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: #1d2a44;
      border-radius: 16px;
      padding: 28px;
    }

    h1 { text-align: center; }

    .section {
      background: #12203b;
      border-radius: 12px;
      padding: 18px;
      margin-top: 18px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      border: none;
    }

    button {
      background: #28c45c;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .secondary { background: #2563eb; }
    .danger { background: #dc2626; }

    .result-box {
      margin-top: 15px;
      background: #08142f;
      border-radius: 10px;
      padding: 14px;
      min-height: 70px;
    }

    .ok { color: #4ade80; }
    .error { color: #f87171; }

    .risk-low { color: #4ade80; }
    .risk-medium { color: #facc15; }
    .risk-high { color: #f87171; }

    .hidden { display: none; }
  </style>
</head>

<body>
<div class="container">
  <h1>Boleto Anti-Fraude</h1>

  <div id="authArea">
    <div class="section">
      <h2>Criar conta</h2>
      <input id="registerName" placeholder="Nome">
      <input id="registerEmail" placeholder="Email">
      <input id="registerPassword" type="password" placeholder="Senha">
      <button onclick="register()">Cadastrar</button>
    </div>

    <div class="section">
      <h2>Login</h2>
      <input id="loginEmail" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Senha">
      <button class="secondary" onclick="login()">Entrar</button>
    </div>

    <div id="authResult" class="result-box"></div>
  </div>

  <div id="appArea" class="hidden">
    <div class="section">
      <h2>Conta</h2>
      <div id="meBox"></div>
      <button class="danger" onclick="logout()">Sair</button>
    </div>

    <div class="section">
      <h2>Analisar boleto</h2>

      <input id="linha" placeholder="Linha digitável">
      <input id="beneficiario" placeholder="Beneficiário">

      <button onclick="analisar()">Analisar</button>

      <input id="pdfFile" type="file" accept=".pdf">
      <button onclick="analisarPdf()">Analisar PDF</button>

      <div id="resultBox" class="result-box"></div>
    </div>
  </div>
</div>

<script>
const API_URL = "boletoantifraude-production.up.railway.app";

function getToken() {
  return localStorage.getItem("token");
}

function setToken(token) {
  localStorage.setItem("token", token);
}

function logout() {
  localStorage.removeItem("token");
  location.reload();
}

function showLoggedIn() {
  document.getElementById("authArea").classList.add("hidden");
  document.getElementById("appArea").classList.remove("hidden");
}

async function register() {
  const res = await fetch(API_URL + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: registerName.value,
      email: registerEmail.value,
      password: registerPassword.value
    })
  });

  const data = await res.json();
  authResult.innerHTML = data.message || data.detail;
}

async function login() {
  const res = await fetch(API_URL + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: loginEmail.value,
      password: loginPassword.value
    })
  });

  const data = await res.json();

  if (data.access_token) {
    setToken(data.access_token);
    showLoggedIn();
    loadMe();
  } else {
    authResult.innerHTML = data.detail;
  }
}

async function loadMe() {
  const res = await fetch(API_URL + "/me", {
    headers: {"Authorization": "Bearer " + getToken()}
  });

  const data = await res.json();

  meBox.innerHTML = `
    Nome: ${data.name}<br>
    Plano: ${data.plan}<br>
    Uso: ${data.used_this_month}/${data.monthly_limit}
  `;
}

async function analisar() {
  const res = await fetch(API_URL + "/analisar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + getToken()
    },
    body: JSON.stringify({
      linha_digitavel: linha.value,
      beneficiario: beneficiario.value
    })
  });

  const data = await res.json();

  resultBox.innerHTML = `
    Risco: ${data.risco}<br>
    Score: ${data.score}<br>
    Banco: ${data.banco_nome}<br>
    Mensagem: ${data.mensagem}
  `;
}

async function analisarPdf() {
  const formData = new FormData();
  formData.append("file", pdfFile.files[0]);

  const res = await fetch(API_URL + "/analisar-pdf", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + getToken()
    },
    body: formData
  });

  const data = await res.json();

  resultBox.innerHTML = `
    Risco: ${data.risco}<br>
    Score: ${data.score}<br>
    Banco: ${data.banco_nome}<br>
    Mensagem: ${data.mensagem}
  `;
}

if (getToken()) {
  showLoggedIn();
  loadMe();
}
</script>
</body>
</html>
