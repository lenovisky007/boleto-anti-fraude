<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Antifraude</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      margin-bottom: 20px;
      text-align: center;
      font-weight: 600;
    }

    .input-group {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 0 2px #3b82f6;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59,130,246,0.3);
    }

    button:active {
      transform: scale(0.98);
    }

    #msg {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      color: #f87171;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      opacity: 0.6;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div class="container" id="box">
  <h2>🔐 Antifraude</h2>

  <div class="input-group">
    <input id="email" placeholder="Email">
  </div>

  <div class="input-group">
    <input id="password" type="password" placeholder="Senha">
  </div>

  <button onclick="login()" id="btn">Entrar</button>

  <p id="msg"></p>

  <div class="footer">
    Proteção inteligente contra fraudes
  </div>
</div>

<script>
const API_URL = "https://boleto-anti-fraude-production.up.railway.app";

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");
  const btn = document.getElementById("btn");
  const box = document.getElementById("box");

  msg.innerText = "";

  if (!email || !password) {
    msg.innerText = "Preencha todos os campos";
    return;
  }

  try {
    btn.innerText = "Entrando...";
    box.classList.add("loading");

    const res = await fetch(API_URL + "/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.access_token);
      window.location.href = "dashboard.html";
    } else {
      msg.innerText = data.detail || "Erro ao fazer login";
    }

  } catch (error) {
    console.error(error);
    msg.innerText = "Erro de conexão com o servidor";
  } finally {
    btn.innerText = "Entrar";
    box.classList.remove("loading");
  }
}
</script>

</body>
</html>
