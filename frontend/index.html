<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema</title>
</head>
<body style="font-family: Arial; padding: 20px;">

<h2>Registrar</h2>
<input id="reg_user" placeholder="Usuário"><br><br>
<input id="reg_pass" type="password" placeholder="Senha"><br><br>
<button onclick="register()">Registrar</button>

<hr>

<h2>Login</h2>
<input id="log_user" placeholder="Usuário"><br><br>
<input id="log_pass" type="password" placeholder="Senha"><br><br>
<button onclick="login()">Entrar</button>

<hr>

<h2>Perfil</h2>
<button onclick="getProfile()">Ver Perfil</button>

<pre id="output" style="background:#eee; padding:10px;"></pre>

<script>
const API = "https://boleto-anti-fraude-production.up.railway.app";

// mostrar resultado bonito
function show(data) {
  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

// REGISTER
async function register() {
  const username = document.getElementById("reg_user").value;
  const password = document.getElementById("reg_pass").value;

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  show(data);

  if (res.ok && data.token) {
    localStorage.setItem("token", data.token);
  }
}

// LOGIN
async function login() {
  const username = document.getElementById("log_user").value;
  const password = document.getElementById("log_pass").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  show(data);

  if (res.ok && data.token) {
    localStorage.setItem("token", data.token);
  }
}

// PERFIL
async function getProfile() {
  const token = localStorage.getItem("token");

  if (!token) {
    show({ erro: "Faça login primeiro" });
    return;
  }

  const res = await fetch(API + "/me", {
    method: "GET",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const data = await res.json();

  show(data);
}
</script>

</body>
</html>
