<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard — Antifraude</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #04091f;
      --surface: #0b1630;
      --surface2: #0f1e3a;
      --border: rgba(99,179,255,0.12);
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --green: #22d3a5;
      --yellow: #facc15;
      --red: #f87171;
      --text: #e2eaf8;
      --muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      max-width: 860px;
      margin: auto;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.5s ease both;
    }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
    }

    .brand p {
      font-size: 12px;
      color: var(--muted);
    }

    .btn-logout {
      background: transparent;
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--red);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover { background: rgba(248,113,113,0.1); }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
    }

    .card-full {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 20px;
      animation: fadeUp 0.5s 0.15s ease both;
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .card-value {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
    }

    .card-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* PROGRESS BAR */
    .progress-wrap {
      background: var(--surface2);
      border-radius: 6px;
      height: 6px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.8s ease;
    }

    /* FORM */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
      margin-top: 4px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(59,130,246,0.45);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* RESULT */
    .result-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      animation: fadeUp 0.4s ease both;
      margin-top: 20px;
    }

    .score-circle {
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 3px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      position: relative;
      transition: border-color 0.4s;
    }

    .score-num {
      font-family: 'Syne', sans-serif;
      font-size: 40px;
      font-weight: 800;
      line-height: 1;
    }

    .score-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .risk-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .risk-low    { background: rgba(34,211,165,0.12); color: var(--green); }
    .risk-medium { background: rgba(250,204,21,0.12);  color: var(--yellow); }
    .risk-high   { background: rgba(248,113,113,0.12); color: var(--red); }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      text-align: left;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      margin-top: 4px;
    }

    @media (max-width: 500px) { .result-grid { grid-template-columns: 1fr; } }

    .result-item .ri-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 3px;
    }

    .result-item .ri-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(59,130,246,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .color-green  { color: var(--green); border-color: var(--green); }
    .color-yellow { color: var(--yellow); border-color: var(--yellow); }
    .color-red    { color: var(--red); border-color: var(--red); }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <div>
        <h1>Anti-Fraude</h1>
        <p>Dashboard de análise</p>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>

  <!-- STATS -->
  <div class="grid">
    <div class="card">
      <div class="card-label">Plano atual</div>
      <div class="card-value" id="statPlan">—</div>
      <div class="card-sub" id="statEmail">Carregando...</div>
    </div>
    <div class="card">
      <div class="card-label">Uso no mês</div>
      <div class="card-value" id="statUso">—</div>
      <div class="card-sub" id="statRestante">Carregando...</div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- FORM -->
  <div class="card-full">
    <div class="section-title">🔎 Analisar boleto</div>

    <div class="field">
      <label>Linha digitável</label>
      <input id="codigo" placeholder="00190000090 01234567890 12345678901 1 12340000010000">
    </div>
    <div class="field">
      <label>Beneficiário (opcional)</label>
      <input id="beneficiario" placeholder="Nome da empresa ou pessoa">
    </div>

    <button class="btn btn-primary" id="btnAnalisar" onclick="validar()">Analisar Boleto</button>
  </div>

  <!-- RESULTADO -->
  <div class="result-panel" id="resultado">
    <div class="score-circle" id="scoreCircle">
      <div class="score-num" id="scoreNum">0</div>
      <div class="score-label">score</div>
    </div>

    <div class="risk-badge" id="riskBadge">—</div>

    <div id="mensagem" style="font-size:14px;color:var(--muted);margin-bottom:16px;"></div>

    <div class="result-grid">
      <div class="result-item">
        <div class="ri-label">Banco</div>
        <div class="ri-value" id="rBanco">—</div>
      </div>
      <div class="result-item">
        <div class="ri-label">Valor</div>
        <div class="ri-value" id="rValor">—</div>
      </div>
      <div class="result-item">
        <div class="ri-label">Vencimento</div>
        <div class="ri-value" id="rVenc">—</div>
      </div>
      <div class="result-item">
        <div class="ri-label">Consultas restantes</div>
        <div class="ri-value" id="rRestante">—</div>
      </div>
    </div>
  </div>

</div>

<script>
const API_URL = "https://boleto-anti-fraude-production.up.railway.app";

/* ── INIT: verifica token antes de qualquer coisa ── */
window.addEventListener("load", () => {
  if (!localStorage.getItem("token")) {
    alert("Sessão expirada. Faça login novamente.");
    window.location.href = "index.html";
    return;
  }
  loadMe();
});

function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

async function safeJson(res) {
  const text = await res.text();
  try { return JSON.parse(text); }
  catch { return { detail: text || "Resposta inválida" }; }
}

/* ── ME ── */
async function loadMe() {
  const token = localStorage.getItem("token");
  try {
    const res  = await fetch(`${API_URL}/me`, {
      headers: { Authorization: "Bearer " + token }
    });

    if (res.status === 401) {
      localStorage.removeItem("token");
      window.location.href = "index.html";
      return;
    }

    const data = await safeJson(res);

    document.getElementById("statPlan").textContent  = data.plan || "—";
    document.getElementById("statEmail").textContent = data.email || "—";

    const used  = data.used_this_month ?? 0;
    const limit = data.monthly_limit   ?? 1;
    const pct   = Math.min(Math.round((used / limit) * 100), 100);

    document.getElementById("statUso").textContent      = `${used} / ${limit}`;
    document.getElementById("statRestante").textContent = `${data.remaining ?? 0} restantes`;
    document.getElementById("progressBar").style.width  = pct + "%";

  } catch (e) {
    console.error("Erro ao carregar conta:", e);
  }
}

/* ── VALIDAR ──
   Usa o mesmo endpoint e campos do index.html para consistência
*/
async function validar() {
  const token       = localStorage.getItem("token");
  const codigo      = document.getElementById("codigo").value.trim();
  const beneficiario = document.getElementById("beneficiario").value.trim();
  const resultado   = document.getElementById("resultado");
  const btn         = document.getElementById("btnAnalisar");

  if (!codigo) {
    alert("Informe a linha digitável.");
    return;
  }

  btn.disabled    = true;
  btn.textContent = "Analisando...";
  resultado.style.display = "block";
  document.getElementById("scoreNum").textContent = "...";
  document.getElementById("riskBadge").textContent = "processando";
  document.getElementById("riskBadge").className  = "risk-badge";
  document.getElementById("mensagem").textContent  = "";

  try {
    const res = await fetch(`${API_URL}/analisar`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
        linha_digitavel: codigo,
        beneficiario: beneficiario
      })
    });

    if (res.status === 401) {
      localStorage.removeItem("token");
      window.location.href = "index.html";
      return;
    }

    const data = await safeJson(res);
    if (!res.ok) throw new Error(data.detail || "Erro ao analisar.");

    const score = data.score ?? 0;

    // determina visual pelo score
    let colorClass, riskClass, riskText, emoji;
    if (score <= 25) {
      colorClass = "color-green"; riskClass = "risk-low";
      riskText   = "Baixo risco"; emoji = "🟢";
    } else if (score <= 55) {
      colorClass = "color-yellow"; riskClass = "risk-medium";
      riskText   = "Atenção";      emoji = "🟡";
    } else {
      colorClass = "color-red"; riskClass = "risk-high";
      riskText   = "Alto risco";   emoji = "🔴";
    }

    const circle = document.getElementById("scoreCircle");
    circle.className = "score-circle " + colorClass;

    const scoreEl = document.getElementById("scoreNum");
    scoreEl.className = "score-num " + colorClass;
    scoreEl.textContent = score;

    const badge = document.getElementById("riskBadge");
    badge.className  = "risk-badge " + riskClass;
    badge.textContent = emoji + " " + riskText;

    document.getElementById("mensagem").textContent   = data.mensagem || "";
    document.getElementById("rBanco").textContent     = data.banco_nome || data.banco || "N/D";
    document.getElementById("rValor").textContent     = data.valor || "N/D";
    document.getElementById("rVenc").textContent      = data.vencimento || "N/D";
    document.getElementById("rRestante").textContent  = data.remaining ?? "N/D";

    await loadMe();

  } catch (e) {
    resultado.style.display = "block";
    document.getElementById("scoreNum").textContent  = "!";
    document.getElementById("riskBadge").textContent = "Erro";
    document.getElementById("mensagem").textContent  = e.message;
    document.getElementById("mensagem").style.color  = "var(--red)";
  } finally {
    btn.disabled    = false;
    btn.textContent = "Analisar Boleto";
  }
}
</script>
</body>
</html>
